[env:esp32-c3-supermini]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
board_build.flash_mode = dio
board_build.partitions = partitions_hizmos.csv

# Note: -flto intentionally omitted. RISC-V gcc 8.4.0 toolchain does not
# support LTO plugin. Causes "plugin needed to handle lto object" linker error.
build_flags =
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -Os                     ; optimize for size
  -DCORE_DEBUG_LEVEL=5    ; enable verbose core debug output
  -DCONFIG_ESP_SYSTEM_PANIC_PRINT_HALT  ; print full panic and halt instead of immediate reboot

lib_deps =
  adafruit/Adafruit SSD1306@^2.5.9
  adafruit/Adafruit GFX Library@^1.11.9
  h2zero/NimBLE-Arduino@^1.4.1
  crankyoldgit/IRremoteESP8266@^2.8.6
  me-no-dev/ESPAsyncWebServer@^1.2.3
  me-no-dev/AsyncTCP@^1.1.1



